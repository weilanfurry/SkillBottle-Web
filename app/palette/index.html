<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>配色生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 40px 20px;
      background: #0f0f1a;
      font-family: system-ui, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-weight: 300; letter-spacing: 3px; margin-bottom: 30px; }
    .palette { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
    .swatch {
      width: 110px;
      height: 140px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 8px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .swatch:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
    .swatch span { font-size: 12px; font-family: ui-monospace, monospace; opacity: 0.9; }
    .hex { margin-bottom: 4px; font-weight: 600; }
    button {
      margin-top: 30px;
      padding: 12px 32px;
      border: 1px solid #9ad1ff;
      background: transparent;
      color: #9ad1ff;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
    }
    button:hover { background: rgba(154,209,255,0.12); }
    .toast {
      position: fixed;
      bottom: 30px;
      background: rgba(255,255,255,0.12);
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <h1>配色生成器</h1>
  <div class="palette" id="palette"></div>
  <button onclick="generate()">随机生成</button>
  <div class="toast" id="toast" style="opacity:0">已复制！</div>
  <script>
    function rand() {
      return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
    }

    function generate() {
      const colors = [rand(), rand(), rand(), rand(), rand()];
      const bg = document.getElementById('palette');
      bg.innerHTML = '';
      colors.forEach(c => {
        const s = document.createElement('div');
        s.className = 'swatch';
        s.style.background = c;
        const h = c.toUpperCase();
        const lum = parseInt(c.slice(1), 16) > 0xffffff/2 ? '#000' : '#fff';
        s.innerHTML = `<span class="hex" style="color:${lum}">${h}</span>`;
        s.onclick = () => copy(h);
        bg.appendChild(s);
      });
    }

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => {
        const t = document.getElementById('toast');
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 1500);
      });
    }
    generate();
  </script>
</body>
</html>
