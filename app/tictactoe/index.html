<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>井字棋</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
    }
    .cell {
      background: #16213e;
      border: none;
      border-radius: 12px;
      font-size: 3rem;
      color: #e94560;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .cell:hover { background: #1f4068; transform: scale(1.05); }
    .cell.o { color: #4ecca3; }
    .msg {
      margin-top: 24px;
      font-size: 1.4rem;
      min-height: 2em;
      letter-spacing: 1px;
    }
    button {
      margin-top: 16px;
      padding: 10px 28px;
      border: 1px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: rgba(233,69,96,0.15); }
  </style>
</head>
<body>
  <h1>井字棋</h1>
  <div class="board" id="board"></div>
  <div class="msg" id="msg">X 的回合</div>
  <button onclick="reset()">重新开始</button>
  <script>
    const board = document.getElementById('board');
    const msg = document.getElementById('msg');
    let state = Array(9).fill(null);
    let turn = 'X';
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function render() {
      board.innerHTML = '';
      state.forEach((v, i) => {
        const btn = document.createElement('button');
        btn.className = 'cell' + (v === 'O' ? ' o' : '');
        btn.textContent = v || '';
        btn.onclick = () => play(i);
        board.appendChild(btn);
      });
    }

    function play(i) {
      if (state[i] || check()) return;
      state[i] = turn;
      if (check()) { msg.textContent = turn + ' 获胜！'; render(); return; }
      if (state.every(Boolean)) { msg.textContent = '平局！'; render(); return; }
      turn = turn === 'X' ? 'O' : 'X';
      msg.textContent = turn + ' 的回合';
      render();
    }

    function check() {
      return wins.some(([a,b,c]) => state[a] && state[a] === state[b] && state[b] === state[c]);
    }

    function reset() {
      state = Array(9).fill(null);
      turn = 'X';
      msg.textContent = "X 的回合";
      render();
    }
    render();
  </script>
</body>
</html>
